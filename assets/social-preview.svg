<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#6C8FF5"/>
    </linearGradient>
    <linearGradient id="node1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAF2FF"/>
      <stop offset="100%" stop-color="#D4E4FF"/>
    </linearGradient>
    <linearGradient id="node2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F7F0"/>
      <stop offset="100%" stop-color="#C8EDDB"/>
    </linearGradient>
    <linearGradient id="node3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF1E7"/>
      <stop offset="100%" stop-color="#FFE0C7"/>
    </linearGradient>
    <linearGradient id="node4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EAFE"/>
      <stop offset="100%" stop-color="#E6D0FD"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#6C8FF5" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Decorative diagram illustration (right side) -->
  <g transform="translate(830, 140)" opacity="0.9">
    <!-- Node A -->
    <rect x="0" y="0" width="130" height="56" rx="12" fill="url(#node1)" stroke="#6C8FF5" stroke-width="2"/>
    <text x="65" y="34" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600" fill="#0F172A">Parser</text>

    <!-- Node B -->
    <rect x="190" y="0" width="130" height="56" rx="12" fill="url(#node2)" stroke="#34D399" stroke-width="2"/>
    <text x="255" y="34" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600" fill="#0F172A">Model</text>

    <!-- Node C -->
    <rect x="95" y="110" width="130" height="56" rx="12" fill="url(#node3)" stroke="#F59E0B" stroke-width="2"/>
    <text x="160" y="144" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600" fill="#0F172A">Layout</text>

    <!-- Node D -->
    <rect x="95" y="220" width="130" height="56" rx="12" fill="url(#node4)" stroke="#A78BFA" stroke-width="2"/>
    <text x="160" y="254" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600" fill="#0F172A">SVG</text>

    <!-- Edges -->
    <g fill="none" stroke="#516074" stroke-width="2" stroke-linecap="round">
      <!-- A -> B -->
      <line x1="130" y1="28" x2="190" y2="28" marker-end="url(#arrow)"/>
      <!-- A -> C -->
      <line x1="65" y1="56" x2="130" y2="110" marker-end="url(#arrow)"/>
      <!-- B -> C -->
      <line x1="255" y1="56" x2="190" y2="110" marker-end="url(#arrow)"/>
      <!-- C -> D -->
      <line x1="160" y1="166" x2="160" y2="220" marker-end="url(#arrow)"/>
    </g>
  </g>

  <!-- Decorative small nodes (scattered, faded) -->
  <g opacity="0.12">
    <rect x="870" y="440" width="80" height="36" rx="8" fill="#EAF2FF" stroke="#6C8FF5" stroke-width="1.5"/>
    <rect x="990" y="420" width="80" height="36" rx="8" fill="#E8F7F0" stroke="#34D399" stroke-width="1.5"/>
    <rect x="1110" y="450" width="80" height="36" rx="8" fill="#F5EAFE" stroke="#A78BFA" stroke-width="1.5"/>
    <line x1="950" y1="458" x2="990" y2="438" stroke="#516074" stroke-width="1.5"/>
    <line x1="1070" y1="438" x2="1110" y2="468" stroke="#516074" stroke-width="1.5"/>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#516074"/>
    </marker>
  </defs>

  <!-- Main text content (left side) -->
  <g transform="translate(80, 140)">
    <!-- Project name -->
    <text font-family="Segoe UI, system-ui, sans-serif" font-size="88" font-weight="700" fill="#FCFCFD" letter-spacing="-1">
      DiagramForge
    </text>

    <!-- Accent underline -->
    <rect y="94" width="240" height="5" rx="2" fill="url(#accent)"/>

    <!-- Tagline -->
    <text y="162" font-family="Segoe UI, system-ui, sans-serif" font-size="42" font-weight="400" fill="#94A3B8" letter-spacing="0.5">
      Beautiful diagrams.
    </text>
    <text y="218" font-family="Segoe UI, system-ui, sans-serif" font-size="42" font-weight="400" fill="#94A3B8" letter-spacing="0.5">
      Text in, SVG out.
    </text>

    <!-- Mermaid badge -->
    <g transform="translate(0, 262)">
      <rect width="310" height="50" rx="25" fill="#1E293B" stroke="#6C8FF5" stroke-width="1.5"/>
      <text x="18" y="36" font-size="28">🧜‍♀️</text>
      <text x="52" y="32" font-family="Segoe UI, system-ui, sans-serif" font-size="24" font-weight="600" fill="#E2E8F0">
        Mermaid supported!
      </text>
    </g>
  </g>

  <!-- Subtle bottom attribution -->
  <text x="640" y="610" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="16" fill="#FCFCFD" letter-spacing="2">
    .NET LIBRARY &amp; CLI
  </text>
</svg>
